<p-autoComplete
  [(ngModel)]="selectedCountry"
  [suggestions]="suggestions"
  (completeMethod)="search($event)"
  [minLength]="3"
  [delay]="250"
  [dropdown]="false"
  optionLabel="name"
  [appendTo]="'body'"
  [name]="name()"
  [id]="id()"
  [placeholder]="placeholder()"
>
  <ng-template pTemplate="item" let-c>
    <div class="country-item">
      <span class="country-name">{{ c.name }}</span>
      <img
        *ngIf="flagUrl(c.iso2) as url"
        class="country-flag"
        [src]="url"
        [alt]="'Drapeau ' + c.name"
        loading="lazy"
      />
    </div>
  </ng-template>

  <ng-template pTemplate="selectedItem" let-c>
    <div class="country-item">
      <span class="country-name">{{ c?.name }}</span>
      <img
        *ngIf="flagUrl(c?.iso2) as url"
        class="country-flag"
        [src]="url"
        [alt]="'Drapeau ' + c?.name"
        loading="lazy"
      />
    </div>
  </ng-template>
</p-autoComplete>
