<div class="result-list mb-10">
  <h3 class="mb-4">Résultats</h3>

  @for (_ of placeholders(); track $index) {
    <div class="card mb-4 result-skeleton-card" aria-hidden="true">
      <div class="card-body p-5">
        <div class="skeleton-line skeleton-date mx-auto mb-4"></div>

        <div class="row align-items-center g-3 mb-4">
          <div class="col d-flex justify-content-end">
            <div class="skeleton-team"></div>
          </div>

          <div class="col-auto">
            <div class="skeleton-score"></div>
          </div>

          <div class="col d-flex justify-content-start">
            <div class="skeleton-team"></div>
          </div>
        </div>

        <div class="skeleton-line skeleton-competition mx-auto mb-2"></div>
        <div class="skeleton-line skeleton-location mx-auto"></div>
      </div>
    </div>
  }
</div>
