<div class="staff-card">
  <div class="avatar">
    @if (photoUrl()) {
      <img [src]="photoUrl()" [alt]="name()">
    } @else {
      <i class="uil uil-users-alt"></i>
    }
  </div>
  <div class="info">
    <span class="name">{{ name() }}</span>
    <span class="role">{{ role() }}</span>
  </div>
  @if (iso2()) {
    <img [src]="'https://flagcdn.com/w20/' + iso2()?.toLowerCase() + '.png'" [alt]="iso2()" class="flag">
  }
</div>
