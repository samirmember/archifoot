<a href="#" class="card mb-4 lift result-container" [attr.data-match-id]="result().externalMatchNo">
  <!-- @Todo: rajouter la bulle (notes) -->
  <div class="card-body p-5">
    <span class="row justify-content-between">
      <div class="w-100 text-center date">
        {{ result().date | date: 'd MMM y' }}
      </div>
      <app-flag
        [position]="'A'"
        [countryName]="result().countryA"
        [iso2]="iso2A()"
        [category]="result().categoryA"
        [classList]="`col d-flex bd-highlight flex-row-reverse`"
      />
      <div class="col align-items-center text-center">
        <span class="badge badge-lg bg-primary rounded-pill result-score"
          >{{ result().scoreA }} - {{ result().scoreB }}</span
        >
      </div>
      <app-flag
        [position]="'B'"
        [countryName]="result().countryB"
        [iso2]="iso2B()"
        [category]="result().categoryB"
        [classList]="`col d-flex bd-highlight`"
      />
      <div class="mt-2 text-center small text-muted">
        <div class="w-100">{{ result().competitionLabel }}</div>
        <div class="w-100">
          <i class="uil uil-location-pin-alt"></i> {{ result().stadium }}. {{ result().city }},
          {{ result().countryStadiumName }}.
        </div>
        @if (result().notes) {
          <a
            href="#"
            class="note-tooltip"
            [aria-label]="result().notes"
            [pTooltip]="tooltipContent"
            tooltipEvent="both"
            tooltipPosition="bottom"
            tooltipPosition="top"
            [appendTo]="'body'"
            [showDelay]="150"
            (click)="$event.preventDefault()"
            ><i class="uil uil-comment-alt-exclamation"></i
          ></a>
          <ng-template #tooltipContent>
            <div class="flex items-center tooltip-container">
              <h3><i class="uil uil-exclamation-triangle"></i> Notes</h3>
              <p>{{ result().notes }}</p>
            </div>
          </ng-template>
        }
      </div>
    </span>
  </div>
  <!-- /.card-body -->
</a>
