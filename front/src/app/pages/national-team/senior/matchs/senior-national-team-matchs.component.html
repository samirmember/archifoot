<section class="wrapper bg-light">
  <div class="container py-14 py-md-16">
    <div class="row text-center">
      <div class="col-xl-10 mx-auto">
        <h2 class="fs-15 text-uppercase text-muted mb-3">Matchs des séniors</h2>
        <h3 class="display-4 mb-10 px-xxl-15">Tous les matchs joués par l'équipe nationale</h3>
      </div>
    </div>

    <div class="row">
      <div class="col-xl-10 mx-auto">
        <form class="filter-form mb-10">
          <div class="row">
            <div class="col-md-4 mb-3">
              <div class="form-select-wrapper">
                <label for="opposing-country" class="form-label">Pays adversaire</label>
                <app-country-input
                  id="country"
                  name="country"
                  (selectedCountryChange)="onCountryChange($event)"
                />
              </div>
            </div>

            <div class="col-md-4 mb-3">
              <div class="form-select-wrapper">
                <label for="year" class="form-label">Année</label>
                <select
                  class="form-select"
                  id="year"
                  [(ngModel)]="selectedYear"
                  (ngModelChange)="onYearChange($event)"
                  name="year"
                >
                  <option [ngValue]="null">Toutes les années</option>
                  @for (year of years; track $index) {
                    <option [ngValue]="year">{{ year }}</option>
                  }
                </select>
              </div>
            </div>

            <div class="col-md-4 mb-3">
              <div class="form-select-wrapper">
                <label for="match-type" class="form-label">Type du match</label>
                <select
                  class="form-select"
                  id="match-type"
                  [(ngModel)]="selectedCompetitionId"
                  (ngModelChange)="onCompetitionChange($event)"
                  name="competition"
                >
                  <option [ngValue]="null">Toutes les compétitions</option>
                  @for (competition of competitions(); track competition.id) {
                    <option [ngValue]="competition.id">{{ competition.name }}</option>
                  }
                </select>
              </div>
            </div>
          </div>
        </form>
        @if (isLoading() && results().length === 0) {
          <app-results-skeleton [count]="3" />
        } @else {
          <app-results-list [list]="results()" />
        }

        @if (results().length > 0) {
          <div class="text-center">
            <button
              type="button"
              class="btn btn-primary"
              [disabled]="isLoading() || !hasMoreResults()"
              (click)="loadMore()"
            >
              @if (isLoading()) {
                Chargement...
              } @else if (hasMoreResults()) {
                Charger des résultats supplémentaires
              } @else {
                Plus aucun résultat
              }
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</section>
