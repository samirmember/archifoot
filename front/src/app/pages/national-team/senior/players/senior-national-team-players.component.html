<section class="wrapper bg-light players-page">
  <div class="container py-14 py-md-16">
    <div class="row text-center mb-8">
      <div class="col-xl-10 mx-auto">
        <h2 class="fs-15 text-uppercase text-muted mb-3">Sélection Algérie</h2>
        <h3 class="display-4 mb-0 px-xxl-15">Les joueurs de l'équipe nationale senior</h3>
      </div>
    </div>

    <div class="players-toolbar card-like">
      <div class="search-box">
        <label for="player-search">Filtrer par nom</label>
        <div class="search-input-group">
          <input
            id="player-search"
            type="text"
            class="form-control"
            placeholder="Ex : Riyad, Islam, Ramy..."
            [(ngModel)]="searchModel"
            (keyup.enter)="onSearch()"
          />
          <button type="button" class="btn btn-primary" (click)="onSearch()">Rechercher</button>
        </div>
      </div>

      <div class="per-page-box">
        <label for="per-page">Afficher</label>
        <select
          id="per-page"
          class="form-select"
          [ngModel]="perPage()"
          (ngModelChange)="onPerPageChange($event)"
        >
          <option value="12">12 joueurs</option>
          <option value="24">24 joueurs</option>
        </select>
      </div>
    </div>

    <p class="results-count">{{ total() }} joueur(s) trouvé(s)</p>

    @if (isLoading()) {
      <app-persons-skeleton [count]="perPage()" />
    } @else if (players().length === 0) {
      <div class="empty-state">Aucun joueur trouvé pour ce filtre.</div>
    } @else {
      <app-players-list [players]="players()" />
    }

    <div class="pagination" aria-label="Pagination des joueurs">
      <button
        type="button"
        class="btn btn-soft-primary"
        [disabled]="page() === 1"
        (click)="goToPage(page() - 1)"
      >
        Précédent
      </button>
      <span>Page {{ page() }} / {{ totalPages() }}</span>
      <button
        type="button"
        class="btn btn-soft-primary"
        [disabled]="page() >= totalPages()"
        (click)="goToPage(page() + 1)"
      >
        Suivant
      </button>
    </div>
  </div>
</section>
