name: Deploy Angular Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    # Only rebuild the front when its sources change
    paths:
      - 'front/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Change working directory to the Angular app folder
        working-directory: front

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Use the Node.js toolchain that matches the Angular project
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      # Install dependencies using the lockfile to ensure reproducible builds
      - name: Install dependencies
        run: npm ci

      # Build the Angular app in production mode.  The extra `--` signals to
      # the Angular CLI that subsequent flags belong to the build command.
      - name: Build Angular frontend
        run: |
          npm run build -- --configuration production

      # Deploy the contents of the build output directory to the `gh-pages`
      # branch.  The output path inside the `dist` folder is usually set in
      # `angular.json` under `projects.<projectName>.architect.build.options.outputPath`.
      # Adjust `publish_dir` if your project name differs (for example, `dist/archifoot`).
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Path to the directory containing the compiled static files
          publish_dir: ./front/dist
          # Publish to the `gh-pages` branch
          publish_branch: gh-pages
