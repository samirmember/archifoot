nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['%env(default:^https?://(localhost|127\\.0\\.0\\.1):4200$:CORS_ALLOW_ORIGIN)%']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization']
        expose_headers: ['Link']
        max_age: 3600
    paths:
        '^/': null
