services:
  db:
    image: mariadb:11
    container_name: archifoot_db
    environment:
      MARIADB_DATABASE: archifoot
      MARIADB_USER: archifoot
      MARIADB_PASSWORD: archifoot
      MARIADB_ROOT_PASSWORD: root
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./bdd/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
  server:
    build:
      context: ../server
      dockerfile: ../dev/php/Dockerfile
    container_name: archifoot_server
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      DATABASE_URL: "mysql://archifoot:archifoot@db:3306/archifoot?serverVersion=mariadb-11.0.0&charset=utf8mb4"
    volumes:
      - ../server:/var/www/html:delegated
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: archifoot_nginx
    ports:
      - "8080:80"
    volumes:
      - ../server:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server

  front:
    build:
      context: ../front
      dockerfile: ../dev/front/Dockerfile.dev
    container_name: archifoot_front
    ports:
      - "4200:4200"
    volumes:
      - ../front:/app:delegated
      - front_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -lc "npm ci && npm start -- --host 0.0.0.0 --port 4200"

volumes:
  db_data:
  front_node_modules:
